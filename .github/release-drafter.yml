name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - breaking
      - major
  - title: "New Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "New Services"
    labels:
      - services
      - new-service
  - title: "Documentation"
    labels:
      - documentation
      - docs
  - title: "Dependencies"
    labels:
      - dependencies
      - deps
  - title: "Maintenance"
    labels:
      - chore
      - maintenance
      - ci

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - feature
      - enhancement
      - services
  patch:
    labels:
      - fix
      - bugfix
      - bug
      - chore
      - maintenance
      - dependencies
      - documentation
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
