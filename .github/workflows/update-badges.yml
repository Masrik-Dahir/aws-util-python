name: Update README Stats Badges

on:
  workflow_run:
    workflows: ["Repository Statistics", "Release Download Statistics"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Fetch latest stats from stats branch
        run: |
          git fetch origin stats
          mkdir -p _stats_tmp

          git show origin/stats:$(git ls-tree -r --name-only origin/stats | grep repo_stats | tail -1) \
            > _stats_tmp/repo.json 2>/dev/null || echo '{}' > _stats_tmp/repo.json

          git show origin/stats:releases/summary.json \
            > _stats_tmp/releases.json 2>/dev/null || echo '{}' > _stats_tmp/releases.json

      - name: Update shields.io badge URLs in README
        run: |
          STARS=$(jq -r '.stars // "0"' _stats_tmp/repo.json)
          FORKS=$(jq -r '.forks // "0"' _stats_tmp/repo.json)
          DOWNLOADS=$(jq -r '.total_downloads // "0"' _stats_tmp/releases.json)

          sed -i "s|img.shields.io/badge/stars-[0-9]*-yellow|img.shields.io/badge/stars-${STARS}-yellow|g" README.md
          sed -i "s|img.shields.io/badge/forks-[0-9]*-blue|img.shields.io/badge/forks-${FORKS}-blue|g" README.md
          sed -i "s|img.shields.io/badge/downloads-[0-9]*-brightgreen|img.shields.io/badge/downloads-${DOWNLOADS}-brightgreen|g" README.md

      - name: Commit badge updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore(badges): update stats $(date -u +%Y-%m-%d)"
          git push origin master
