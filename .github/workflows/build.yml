name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          # The standard library tool for building Python packages
          pip install build

      - name: Build package
        # Creates a source distribution (sdist) and wheel (wheel) in the dist/ directory
        run: python -m build

      - name: Upload build artifacts
        # Saves the generated files so you can inspect them or pass them to a publish job
        uses: actions/upload-artifact@v4
        with:
          name: package-distributions
          path: dist/
