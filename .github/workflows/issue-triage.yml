name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-Triage Issues
    runs-on: ubuntu-latest

    steps:
      - name: Add triage label
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = ['triage'];

            if (title.includes('bug') || body.includes('bug') || body.includes('error') || body.includes('crash')) {
              labels.push('bug');
            }
            if (title.includes('feature') || title.includes('request') || body.includes('feature request')) {
              labels.push('enhancement');
            }
            if (title.includes('docs') || title.includes('documentation')) {
              labels.push('documentation');
            }

            const services = ['s3', 'sqs', 'dynamodb', 'lambda', 'sns', 'ses', 'ecs', 'eks', 'rds', 'bedrock', 'cognito', 'kinesis', 'glue', 'athena'];
            for (const svc of services) {
              if (title.includes(svc) || body.includes(svc)) {
                labels.push(`service:${svc}`);
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labels
            });
