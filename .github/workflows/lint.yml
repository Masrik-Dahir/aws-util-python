name: Lint

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Optional: caching speeds up subsequent runs
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        # This checks only your src directory and ignores errors Ruff can't fix
        run: ruff check src/

      - name: Check Formatting
        # Ensures your code follows the style guide without actually changing files
        run: ruff format --check src/
