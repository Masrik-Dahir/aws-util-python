<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="awsutil-author-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#101830"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="awsutil-author-trace1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#00ffcc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="awsutil-author-trace2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff6b35" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#ffaa00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="awsutil-author-trace3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="awsutil-author-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="awsutil-author-glow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#awsutil-author-bg)"/>

  <!-- Circuit grid lines -->
  <g opacity="0.08" stroke="#3b82f6" stroke-width="0.5" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/>
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="120"/>
    <line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/>
    <line x1="500" y1="0" x2="500" y2="120"/>
    <line x1="600" y1="0" x2="600" y2="120"/>
    <line x1="700" y1="0" x2="700" y2="120"/>
  </g>

  <!-- Trace path 1 - top horizontal with pulse -->
  <path d="M 0 25 L 120 25 L 140 15 L 200 15 L 220 25 L 350 25" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M 0 25 L 120 25 L 140 15 L 200 15 L 220 25 L 350 25" fill="none" stroke="url(#awsutil-author-trace1)" stroke-width="2" stroke-dasharray="60 290" stroke-dashoffset="350">
    <animate attributeName="stroke-dashoffset" values="350;-350" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Trace path 2 - bottom right with pulse -->
  <path d="M 450 95 L 550 95 L 570 105 L 650 105 L 680 85 L 800 85" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.3"/>
  <path d="M 450 95 L 550 95 L 570 105 L 650 105 L 680 85 L 800 85" fill="none" stroke="url(#awsutil-author-trace2)" stroke-width="2" stroke-dasharray="50 300" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;-350" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Trace path 3 - left vertical bend -->
  <path d="M 60 0 L 60 40 L 80 60 L 80 120" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.25"/>
  <path d="M 60 0 L 60 40 L 80 60 L 80 120" fill="none" stroke="url(#awsutil-author-trace3)" stroke-width="2" stroke-dasharray="40 120" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;-160" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <!-- Trace path 4 - right vertical -->
  <path d="M 720 120 L 720 70 L 740 50 L 740 0" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.25"/>
  <path d="M 720 120 L 720 70 L 740 50 L 740 0" fill="none" stroke="url(#awsutil-author-trace3)" stroke-width="2" stroke-dasharray="40 120" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" values="80;-80" dur="3.2s" repeatCount="indefinite"/>
  </path>

  <!-- Circuit nodes - pulsing dots at junctions -->
  <circle cx="140" cy="15" r="3" fill="#00d4ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="25" r="3" fill="#00ffcc" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="570" cy="105" r="3" fill="#ff6b35" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="85" r="3" fill="#ffaa00" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="60" r="3" fill="#c084fc" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="50" r="3" fill="#c084fc" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Glow layer behind text -->
  <rect x="180" y="28" width="440" height="68" rx="10" fill="#0a0e1a" opacity="0.7"/>

  <!-- Author name -->
  <text x="400" y="58" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#e2e8f0" text-anchor="middle" letter-spacing="3" opacity="0">
    Masrik Dahir
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Website -->
  <text x="400" y="82" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#00d4ff" text-anchor="middle" letter-spacing="2" opacity="0">
    &#10022; masrikdahir.com &#10022;
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Corner accent chips -->
  <rect x="10" y="10" width="8" height="8" rx="1" fill="#00d4ff" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="782" y="10" width="8" height="8" rx="1" fill="#ff6b35" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="10" y="102" width="8" height="8" rx="1" fill="#a855f7" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="782" y="102" width="8" height="8" rx="1" fill="#00ffcc" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" begin="3s" repeatCount="indefinite"/>
  </rect>
</svg>