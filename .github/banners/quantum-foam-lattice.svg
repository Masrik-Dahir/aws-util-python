<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="qfl-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050b14"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
    <!-- Cell glow radial -->
    <radialGradient id="qfl-glow-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qfl-glow-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b44fff" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#b44fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qfl-glow-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#qfl-bg)"/>

  <!-- Hex lattice row 1 (y≈20) — teal nodes -->
  <!-- Node columns at x: 60,140,220,300,380,460,540,620,700,780 -->
  <!-- Edges connecting them -->
  <g stroke="#00e5ff" stroke-width="0.6" opacity="0.25">
    <line x1="60" y1="22" x2="140" y2="22"/><line x1="140" y1="22" x2="220" y2="22"/>
    <line x1="220" y1="22" x2="300" y2="22"/><line x1="300" y1="22" x2="380" y2="22"/>
    <line x1="380" y1="22" x2="460" y2="22"/><line x1="460" y1="22" x2="540" y2="22"/>
    <line x1="540" y1="22" x2="620" y2="22"/><line x1="620" y1="22" x2="700" y2="22"/>
    <line x1="700" y1="22" x2="780" y2="22"/>
    <!-- diagonals to row 2 y≈60 at offsets +40 -->
    <line x1="60" y1="22" x2="100" y2="60"/><line x1="140" y1="22" x2="180" y2="60"/>
    <line x1="220" y1="22" x2="260" y2="60"/><line x1="300" y1="22" x2="340" y2="60"/>
    <line x1="380" y1="22" x2="420" y2="60"/><line x1="460" y1="22" x2="500" y2="60"/>
    <line x1="540" y1="22" x2="580" y2="60"/><line x1="620" y1="22" x2="660" y2="60"/>
    <line x1="700" y1="22" x2="740" y2="60"/>
    <line x1="140" y1="22" x2="100" y2="60"/><line x1="220" y1="22" x2="180" y2="60"/>
    <line x1="300" y1="22" x2="260" y2="60"/><line x1="380" y1="22" x2="340" y2="60"/>
    <line x1="460" y1="22" x2="420" y2="60"/><line x1="540" y1="22" x2="500" y2="60"/>
    <line x1="620" y1="22" x2="580" y2="60"/><line x1="700" y1="22" x2="660" y2="60"/>
    <line x1="780" y1="22" x2="740" y2="60"/>
  </g>
  <!-- Hex lattice row 2 (y≈60) — purple nodes -->
  <g stroke="#b44fff" stroke-width="0.6" opacity="0.25">
    <line x1="100" y1="60" x2="180" y2="60"/><line x1="180" y1="60" x2="260" y2="60"/>
    <line x1="260" y1="60" x2="340" y2="60"/><line x1="340" y1="60" x2="420" y2="60"/>
    <line x1="420" y1="60" x2="500" y2="60"/><line x1="500" y1="60" x2="580" y2="60"/>
    <line x1="580" y1="60" x2="660" y2="60"/><line x1="660" y1="60" x2="740" y2="60"/>
    <!-- diagonals to row 3 y≈98 -->
    <line x1="100" y1="60" x2="60" y2="98"/><line x1="100" y1="60" x2="140" y2="98"/>
    <line x1="180" y1="60" x2="140" y2="98"/><line x1="180" y1="60" x2="220" y2="98"/>
    <line x1="260" y1="60" x2="220" y2="98"/><line x1="260" y1="60" x2="300" y2="98"/>
    <line x1="340" y1="60" x2="300" y2="98"/><line x1="340" y1="60" x2="380" y2="98"/>
    <line x1="420" y1="60" x2="380" y2="98"/><line x1="420" y1="60" x2="460" y2="98"/>
    <line x1="500" y1="60" x2="460" y2="98"/><line x1="500" y1="60" x2="540" y2="98"/>
    <line x1="580" y1="60" x2="540" y2="98"/><line x1="580" y1="60" x2="620" y2="98"/>
    <line x1="660" y1="60" x2="620" y2="98"/><line x1="660" y1="60" x2="700" y2="98"/>
    <line x1="740" y1="60" x2="700" y2="98"/><line x1="740" y1="60" x2="780" y2="98"/>
  </g>
  <!-- Hex lattice row 3 (y≈98) -->
  <g stroke="#00e5ff" stroke-width="0.6" opacity="0.18">
    <line x1="60" y1="98" x2="140" y2="98"/><line x1="140" y1="98" x2="220" y2="98"/>
    <line x1="220" y1="98" x2="300" y2="98"/><line x1="300" y1="98" x2="380" y2="98"/>
    <line x1="380" y1="98" x2="460" y2="98"/><line x1="460" y1="98" x2="540" y2="98"/>
    <line x1="540" y1="98" x2="620" y2="98"/><line x1="620" y1="98" x2="700" y2="98"/>
    <line x1="700" y1="98" x2="780" y2="98"/>
  </g>

  <!-- Animated teal node pulses — row 1 -->
  <circle cx="60" cy="22" r="14" fill="url(#qfl-glow-a)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="22" r="14" fill="url(#qfl-glow-a)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="22" r="16" fill="url(#qfl-glow-a)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="22" r="14" fill="url(#qfl-glow-a)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="22" r="14" fill="url(#qfl-glow-a)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <!-- Animated purple node pulses — row 2 -->
  <circle cx="100" cy="60" r="13" fill="url(#qfl-glow-b)">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="60" r="16" fill="url(#qfl-glow-b)">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="60" r="13" fill="url(#qfl-glow-b)">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.6s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="60" r="15" fill="url(#qfl-glow-b)">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.0s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="60" r="13" fill="url(#qfl-glow-b)">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.4s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- White flickers — random nodes -->
  <circle cx="140" cy="22" r="4" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="0.4s" begin="1.5s" repeatCount="indefinite" calcMode="discrete"/>
  </circle>
  <circle cx="460" cy="22" r="4" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="0.4s" begin="2.8s" repeatCount="indefinite" calcMode="discrete"/>
  </circle>
  <circle cx="180" cy="60" r="4" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="0.4s" begin="0.7s" repeatCount="indefinite" calcMode="discrete"/>
  </circle>
  <circle cx="500" cy="60" r="5" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="0.5s" begin="2.1s" repeatCount="indefinite" calcMode="discrete"/>
  </circle>
  <!-- Small dot nodes at lattice vertices -->
  <g fill="#00e5ff" opacity="0.5">
    <circle cx="60" cy="22" r="2.5"/><circle cx="140" cy="22" r="2"/><circle cx="220" cy="22" r="2.5"/>
    <circle cx="300" cy="22" r="2"/><circle cx="380" cy="22" r="3"/><circle cx="460" cy="22" r="2"/>
    <circle cx="540" cy="22" r="2.5"/><circle cx="620" cy="22" r="2"/><circle cx="700" cy="22" r="2.5"/>
    <circle cx="780" cy="22" r="2"/>
  </g>
  <g fill="#b44fff" opacity="0.5">
    <circle cx="100" cy="60" r="2.5"/><circle cx="180" cy="60" r="2"/><circle cx="260" cy="60" r="3"/>
    <circle cx="340" cy="60" r="2"/><circle cx="420" cy="60" r="2.5"/><circle cx="500" cy="60" r="2"/>
    <circle cx="580" cy="60" r="2.5"/><circle cx="660" cy="60" r="2"/><circle cx="740" cy="60" r="2.5"/>
  </g>

  <!-- Text backdrop -->
  <rect x="210" y="34" width="380" height="54" rx="8" fill="#000000" opacity="0.42"/>

  <!-- Author text -->
  <text x="400" y="58" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#e0f7ff" text-anchor="middle" letter-spacing="3">
    Masrik Dahir<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="80" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#00e5ff" text-anchor="middle" letter-spacing="2">
    ✦ masrikdahir.com ✦<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
