<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="tbf-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="tbf-bucket-fill-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tbf-bucket-fill-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tbf-bucket-fill-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#065f46" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="tbf-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tbf-clip-l">
      <rect x="58" y="22" width="54" height="76" rx="4"/>
    </clipPath>
    <clipPath id="tbf-clip-c">
      <rect x="373" y="22" width="54" height="76" rx="4"/>
    </clipPath>
    <clipPath id="tbf-clip-r">
      <rect x="688" y="22" width="54" height="76" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#tbf-bg)"/>

  <!-- Horizontal tick marks (rate limit indicator lines) -->
  <line x1="50" y1="20" x2="760" y2="20" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="50" y1="45" x2="760" y2="45" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="50" y1="70" x2="760" y2="70" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="50" y1="95" x2="760" y2="95" stroke="#1e293b" stroke-width="0.5"/>

  <!-- === LEFT BUCKET (cyan — fills fast) === -->
  <!-- Bucket outline -->
  <rect x="58" y="22" width="54" height="76" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2" opacity="0.9"/>
  <!-- Animated fill level — rises from empty to full -->
  <rect x="58" clip-path="url(#tbf-clip-l)" width="54" fill="url(#tbf-bucket-fill-l)">
    <animate attributeName="y" values="98;22;22;98" dur="4s" keyTimes="0;0.45;0.85;1" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;76;76;0" dur="4s" keyTimes="0;0.45;0.85;1" repeatCount="indefinite"/>
  </rect>
  <!-- Bucket label -->
  <text x="85" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#38bdf8" opacity="0.8">req/s</text>
  <!-- Overflow drip tokens (when full) -->
  <circle cx="85" cy="105" r="3" fill="#38bdf8" filter="url(#tbf-glow)">
    <animate attributeName="cy" values="22;130" dur="0.8s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="105" r="2" fill="#38bdf8" filter="url(#tbf-glow)">
    <animate attributeName="cy" values="22;130" dur="0.8s" begin="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- === CENTER BUCKET (green — slower fill) === -->
  <rect x="373" y="22" width="54" height="76" rx="4" fill="#0f172a" stroke="#34d399" stroke-width="1.2" opacity="0.9"/>
  <rect x="373" clip-path="url(#tbf-clip-c)" width="54" fill="url(#tbf-bucket-fill-c)">
    <animate attributeName="y" values="98;22;22;98" dur="5.5s" keyTimes="0;0.5;0.88;1" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;76;76;0" dur="5.5s" keyTimes="0;0.5;0.88;1" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#34d399" opacity="0.8">burst</text>
  <circle cx="400" cy="22" r="2.5" fill="#34d399" filter="url(#tbf-glow)">
    <animate attributeName="cy" values="22;130" dur="0.9s" begin="2.75s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.9s" begin="2.75s" repeatCount="indefinite"/>
  </circle>

  <!-- === RIGHT BUCKET (purple — fills medium) === -->
  <rect x="688" y="22" width="54" height="76" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="1.2" opacity="0.9"/>
  <rect x="688" clip-path="url(#tbf-clip-r)" width="54" fill="url(#tbf-bucket-fill-r)">
    <animate attributeName="y" values="98;22;22;98" dur="4.8s" keyTimes="0;0.48;0.86;1" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;76;76;0" dur="4.8s" keyTimes="0;0.48;0.86;1" repeatCount="indefinite"/>
  </rect>
  <text x="715" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.8">quota</text>
  <circle cx="715" cy="22" r="2.5" fill="#a78bfa" filter="url(#tbf-glow)">
    <animate attributeName="cy" values="22;130" dur="0.75s" begin="2.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.75s" begin="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Flowing tokens (circles) traveling from source → bucket left -->
  <circle r="4" fill="#38bdf8" filter="url(#tbf-glow)">
    <animateMotion path="M20,60 Q45,60 85,35" dur="1.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="3" fill="#38bdf8" filter="url(#tbf-glow)">
    <animateMotion path="M20,60 Q45,60 85,35" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- Flowing tokens toward center bucket -->
  <circle r="4" fill="#34d399" filter="url(#tbf-glow)">
    <animateMotion path="M170,60 Q285,30 390,35" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>

  <!-- Flowing tokens toward right bucket -->
  <circle r="4" fill="#a78bfa" filter="url(#tbf-glow)">
    <animateMotion path="M580,60 Q630,40 705,35" dur="1.3s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="1;0" dur="1.3s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="3" fill="#a78bfa" filter="url(#tbf-glow)">
    <animateMotion path="M580,60 Q630,40 705,35" dur="1.3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="1;0" dur="1.3s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Text overlay background -->
  <rect x="190" y="32" width="420" height="58" rx="8" fill="#000000" opacity="0.5"/>

  <!-- Text -->
  <text x="400" y="57" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#f8fafc" text-anchor="middle" letter-spacing="4">
    aws-util<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="78" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#34d399" text-anchor="middle" letter-spacing="1">
    typed AWS wrappers · sync + async · Pydantic v2<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
