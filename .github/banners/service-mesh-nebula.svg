<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <radialGradient id="awsutil-proj-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#0c1324"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="awsutil-proj-nebula1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="awsutil-proj-nebula2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="awsutil-proj-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="awsutil-proj-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="awsutil-proj-soften">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#awsutil-proj-bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="240" cy="50" rx="200" ry="60" fill="url(#awsutil-proj-nebula1)" filter="url(#awsutil-proj-soften)">
    <animate attributeName="rx" values="200;220;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="560" cy="70" rx="180" ry="50" fill="url(#awsutil-proj-nebula2)" filter="url(#awsutil-proj-soften)">
    <animate attributeName="rx" values="180;200;180" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Service mesh edges - connecting lines between nodes -->
  <g stroke="#f97316" stroke-width="0.5" opacity="0.2">
    <line x1="50" y1="30" x2="150" y2="60"/>
    <line x1="150" y1="60" x2="100" y2="95"/>
    <line x1="50" y1="30" x2="100" y2="95"/>
    <line x1="150" y1="60" x2="250" y2="35"/>
    <line x1="250" y1="35" x2="300" y2="80"/>
    <line x1="150" y1="60" x2="300" y2="80"/>
    <line x1="500" y1="40" x2="600" y2="70"/>
    <line x1="600" y1="70" x2="550" y2="100"/>
    <line x1="500" y1="40" x2="550" y2="100"/>
    <line x1="600" y1="70" x2="700" y2="30"/>
    <line x1="700" y1="30" x2="750" y2="85"/>
    <line x1="600" y1="70" x2="750" y2="85"/>
  </g>

  <!-- Animated pulse traveling along edges -->
  <circle r="2" fill="#fbbf24" opacity="0" filter="url(#awsutil-proj-glow)">
    <animate attributeName="cx" values="50;150;250;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;60;35;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#60a5fa" opacity="0" filter="url(#awsutil-proj-glow)">
    <animate attributeName="cx" values="500;600;700;750" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;70;30;85" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Service nodes - left cluster -->
  <circle cx="50" cy="30" r="4" fill="#f97316" opacity="0.6">
    <animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="60" r="5" fill="#fbbf24" opacity="0.7">
    <animate attributeName="r" values="4;6;4" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="95" r="3.5" fill="#fb923c" opacity="0.5">
    <animate attributeName="r" values="2.5;4.5;2.5" dur="4.2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="35" r="4" fill="#f97316" opacity="0.6">
    <animate attributeName="r" values="3;5;3" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="80" r="3" fill="#fbbf24" opacity="0.5">
    <animate attributeName="r" values="2;4;2" dur="4.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Service nodes - right cluster -->
  <circle cx="500" cy="40" r="4" fill="#3b82f6" opacity="0.6">
    <animate attributeName="r" values="3;5;3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="70" r="5" fill="#60a5fa" opacity="0.7">
    <animate attributeName="r" values="4;6;4" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="100" r="3.5" fill="#93c5fd" opacity="0.5">
    <animate attributeName="r" values="2.5;4.5;2.5" dur="4.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="30" r="4" fill="#3b82f6" opacity="0.6">
    <animate attributeName="r" values="3;5;3" dur="3.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="85" r="3" fill="#60a5fa" opacity="0.5">
    <animate attributeName="r" values="2;4;2" dur="4.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Background stars -->
  <circle cx="380" cy="15" r="1" fill="#e2e8f0" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="108" r="0.8" fill="#e2e8f0" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="12" r="0.8" fill="#e2e8f0" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="15" r="1" fill="#e2e8f0" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dark overlay behind text -->
  <rect x="200" y="26" width="400" height="72" rx="10" fill="#0f172a" opacity="0.75"/>

  <!-- Project name -->
  <text x="400" y="56" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#f8fafc" text-anchor="middle" letter-spacing="4" opacity="0">
    aws-util
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="400" y="80" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#fbbf24" text-anchor="middle" letter-spacing="1" opacity="0">
    135 modules. 7,300+ functions. Every AWS service in one import.
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>