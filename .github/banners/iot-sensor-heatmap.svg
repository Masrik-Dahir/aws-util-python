<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="ish-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f18"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <!-- Cell temperature gradients: cool=blue, warm=amber, hot=orange-red -->
    <radialGradient id="ish-cold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0af0ff"/>
      <stop offset="100%" stop-color="#0040a0"/>
    </radialGradient>
    <radialGradient id="ish-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#c05000"/>
    </radialGradient>
    <radialGradient id="ish-hot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6020"/>
      <stop offset="100%" stop-color="#990000"/>
    </radialGradient>
    <filter id="ish-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#ish-bg)"/>

  <!-- Sensor grid: 18 cells across, 4 rows. Cell size ~18x22px, starting x=10 -->
  <!-- Row 1 (y=6) -->
  <rect x="10"  y="6"  width="16" height="20" rx="3" fill="#0040a0" opacity="0.7"><animate attributeName="fill" values="#0040a0;#0af0ff;#ffcc00;#0040a0" dur="4.1s" begin="0s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;1;0.8;0.7" dur="4.1s" begin="0s" repeatCount="indefinite"/></rect>
  <rect x="30"  y="6"  width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#0040a0;#0af0ff;#ffcc00" dur="3.7s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.6;1;0.8" dur="3.7s" begin="0.3s" repeatCount="indefinite"/></rect>
  <rect x="50"  y="6"  width="16" height="20" rx="3" fill="#ff6020" opacity="0.9"><animate attributeName="fill" values="#ff6020;#ffcc00;#0040a0;#ff6020" dur="5.2s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0.7;0.9;0.9" dur="5.2s" begin="0.6s" repeatCount="indefinite"/></rect>
  <rect x="70"  y="6"  width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#ff6020;#ffcc00;#0af0ff" dur="3.9s" begin="0.9s" repeatCount="indefinite"/></rect>
  <rect x="90"  y="6"  width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#0af0ff;#ff6020;#ffcc00" dur="4.5s" begin="1.2s" repeatCount="indefinite"/></rect>
  <rect x="110" y="6"  width="16" height="20" rx="3" fill="#0040a0" opacity="0.6"><animate attributeName="fill" values="#0040a0;#ffcc00;#0af0ff;#0040a0" dur="4.8s" begin="0.4s" repeatCount="indefinite"/></rect>

  <!-- Row 2 (y=30) -->
  <rect x="10"  y="30" width="16" height="20" rx="3" fill="#ff6020" opacity="0.8"><animate attributeName="fill" values="#ff6020;#0040a0;#ffcc00;#ff6020" dur="5.0s" begin="0.7s" repeatCount="indefinite"/></rect>
  <rect x="30"  y="30" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.9"><animate attributeName="fill" values="#0af0ff;#ff6020;#0040a0;#0af0ff" dur="3.5s" begin="1.0s" repeatCount="indefinite"/></rect>
  <rect x="50"  y="30" width="16" height="20" rx="3" fill="#0040a0" opacity="0.7"><animate attributeName="fill" values="#0040a0;#ffcc00;#ff6020;#0040a0" dur="4.2s" begin="0.2s" repeatCount="indefinite"/></rect>
  <rect x="70"  y="30" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#0040a0;#0af0ff;#ffcc00" dur="6.0s" begin="1.5s" repeatCount="indefinite"/></rect>
  <rect x="90"  y="30" width="16" height="20" rx="3" fill="#ff6020" opacity="0.9"><animate attributeName="fill" values="#ff6020;#ffcc00;#0040a0;#ff6020" dur="4.7s" begin="0.8s" repeatCount="indefinite"/></rect>
  <rect x="110" y="30" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#0040a0;#ffcc00;#0af0ff" dur="3.3s" begin="0.5s" repeatCount="indefinite"/></rect>

  <!-- Row 3 (y=54) -->
  <rect x="10"  y="54" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#ffcc00;#ff6020;#0af0ff" dur="4.0s" begin="1.1s" repeatCount="indefinite"/></rect>
  <rect x="30"  y="54" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#ff6020;#0040a0;#ffcc00" dur="5.5s" begin="0.6s" repeatCount="indefinite"/></rect>
  <rect x="50"  y="54" width="16" height="20" rx="3" fill="#ff6020" opacity="0.9"><animate attributeName="fill" values="#ff6020;#0040a0;#0af0ff;#ff6020" dur="3.8s" begin="1.3s" repeatCount="indefinite"/></rect>
  <rect x="70"  y="54" width="16" height="20" rx="3" fill="#0040a0" opacity="0.6"><animate attributeName="fill" values="#0040a0;#0af0ff;#ffcc00;#0040a0" dur="4.4s" begin="0.3s" repeatCount="indefinite"/></rect>
  <rect x="90"  y="54" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.7"><animate attributeName="fill" values="#ffcc00;#0040a0;#ff6020;#ffcc00" dur="5.1s" begin="1.7s" repeatCount="indefinite"/></rect>
  <rect x="110" y="54" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.8"><animate attributeName="fill" values="#0af0ff;#ff6020;#0040a0;#0af0ff" dur="3.6s" begin="0.9s" repeatCount="indefinite"/></rect>

  <!-- Row 4 (y=78) -->
  <rect x="10"  y="78" width="16" height="20" rx="3" fill="#ff6020" opacity="0.8"><animate attributeName="fill" values="#ff6020;#0af0ff;#ffcc00;#ff6020" dur="4.6s" begin="1.4s" repeatCount="indefinite"/></rect>
  <rect x="30"  y="78" width="16" height="20" rx="3" fill="#0040a0" opacity="0.7"><animate attributeName="fill" values="#0040a0;#ff6020;#0af0ff;#0040a0" dur="3.4s" begin="0.2s" repeatCount="indefinite"/></rect>
  <rect x="50"  y="78" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.9"><animate attributeName="fill" values="#ffcc00;#0040a0;#ff6020;#ffcc00" dur="5.8s" begin="1.6s" repeatCount="indefinite"/></rect>
  <rect x="70"  y="78" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#ffcc00;#0040a0;#0af0ff" dur="4.3s" begin="0.7s" repeatCount="indefinite"/></rect>
  <rect x="90"  y="78" width="16" height="20" rx="3" fill="#ff6020" opacity="0.8"><animate attributeName="fill" values="#ff6020;#0040a0;#ffcc00;#ff6020" dur="3.9s" begin="1.2s" repeatCount="indefinite"/></rect>
  <rect x="110" y="78" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.7"><animate attributeName="fill" values="#ffcc00;#ff6020;#0af0ff;#ffcc00" dur="4.9s" begin="0.4s" repeatCount="indefinite"/></rect>

  <!-- Right-side sensor grid (mirrored, x=670-790) -->
  <!-- Row 1 -->
  <rect x="670" y="6"  width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#ff6020;#ffcc00;#0af0ff" dur="4.3s" begin="0.5s" repeatCount="indefinite"/></rect>
  <rect x="690" y="6"  width="16" height="20" rx="3" fill="#ff6020" opacity="0.8"><animate attributeName="fill" values="#ff6020;#0040a0;#0af0ff;#ff6020" dur="5.1s" begin="1.1s" repeatCount="indefinite"/></rect>
  <rect x="710" y="6"  width="16" height="20" rx="3" fill="#ffcc00" opacity="0.7"><animate attributeName="fill" values="#ffcc00;#0af0ff;#0040a0;#ffcc00" dur="3.7s" begin="0.8s" repeatCount="indefinite"/></rect>
  <rect x="730" y="6"  width="16" height="20" rx="3" fill="#0040a0" opacity="0.9"><animate attributeName="fill" values="#0040a0;#ffcc00;#ff6020;#0040a0" dur="4.0s" begin="1.3s" repeatCount="indefinite"/></rect>
  <rect x="750" y="6"  width="16" height="20" rx="3" fill="#ff6020" opacity="0.7"><animate attributeName="fill" values="#ff6020;#0af0ff;#0040a0;#ff6020" dur="5.4s" begin="0.2s" repeatCount="indefinite"/></rect>
  <rect x="770" y="6"  width="16" height="20" rx="3" fill="#0af0ff" opacity="0.8"><animate attributeName="fill" values="#0af0ff;#ffcc00;#ff6020;#0af0ff" dur="3.6s" begin="1.6s" repeatCount="indefinite"/></rect>
  <!-- Row 2 -->
  <rect x="670" y="30" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#0040a0;#0af0ff;#ffcc00" dur="4.7s" begin="1.4s" repeatCount="indefinite"/></rect>
  <rect x="690" y="30" width="16" height="20" rx="3" fill="#0040a0" opacity="0.6"><animate attributeName="fill" values="#0040a0;#ff6020;#ffcc00;#0040a0" dur="3.3s" begin="0.6s" repeatCount="indefinite"/></rect>
  <rect x="710" y="30" width="16" height="20" rx="3" fill="#ff6020" opacity="0.9"><animate attributeName="fill" values="#ff6020;#0af0ff;#0040a0;#ff6020" dur="4.1s" begin="0.3s" repeatCount="indefinite"/></rect>
  <rect x="730" y="30" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.7"><animate attributeName="fill" values="#0af0ff;#ffcc00;#ff6020;#0af0ff" dur="5.9s" begin="1.7s" repeatCount="indefinite"/></rect>
  <rect x="750" y="30" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.8"><animate attributeName="fill" values="#ffcc00;#ff6020;#0040a0;#ffcc00" dur="3.5s" begin="0.9s" repeatCount="indefinite"/></rect>
  <rect x="770" y="30" width="16" height="20" rx="3" fill="#ff6020" opacity="0.7"><animate attributeName="fill" values="#ff6020;#0040a0;#0af0ff;#ff6020" dur="4.8s" begin="1.2s" repeatCount="indefinite"/></rect>
  <!-- Row 3 -->
  <rect x="670" y="54" width="16" height="20" rx="3" fill="#0040a0" opacity="0.8"><animate attributeName="fill" values="#0040a0;#0af0ff;#ff6020;#0040a0" dur="5.2s" begin="0.7s" repeatCount="indefinite"/></rect>
  <rect x="690" y="54" width="16" height="20" rx="3" fill="#ff6020" opacity="0.7"><animate attributeName="fill" values="#ff6020;#ffcc00;#0040a0;#ff6020" dur="3.8s" begin="1.5s" repeatCount="indefinite"/></rect>
  <rect x="710" y="54" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.9"><animate attributeName="fill" values="#0af0ff;#0040a0;#ffcc00;#0af0ff" dur="4.4s" begin="0.4s" repeatCount="indefinite"/></rect>
  <rect x="730" y="54" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.7"><animate attributeName="fill" values="#ffcc00;#ff6020;#0af0ff;#ffcc00" dur="6.1s" begin="1.0s" repeatCount="indefinite"/></rect>
  <rect x="750" y="54" width="16" height="20" rx="3" fill="#0040a0" opacity="0.8"><animate attributeName="fill" values="#0040a0;#ffcc00;#0af0ff;#0040a0" dur="3.2s" begin="0.5s" repeatCount="indefinite"/></rect>
  <rect x="770" y="54" width="16" height="20" rx="3" fill="#ff6020" opacity="0.7"><animate attributeName="fill" values="#ff6020;#0af0ff;#ffcc00;#ff6020" dur="5.6s" begin="1.8s" repeatCount="indefinite"/></rect>
  <!-- Row 4 -->
  <rect x="670" y="78" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.7"><animate attributeName="fill" values="#ffcc00;#ff6020;#0040a0;#ffcc00" dur="4.5s" begin="1.3s" repeatCount="indefinite"/></rect>
  <rect x="690" y="78" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.8"><animate attributeName="fill" values="#0af0ff;#0040a0;#ff6020;#0af0ff" dur="3.9s" begin="0.1s" repeatCount="indefinite"/></rect>
  <rect x="710" y="78" width="16" height="20" rx="3" fill="#0040a0" opacity="0.9"><animate attributeName="fill" values="#0040a0;#ff6020;#0af0ff;#0040a0" dur="5.3s" begin="1.6s" repeatCount="indefinite"/></rect>
  <rect x="730" y="78" width="16" height="20" rx="3" fill="#ff6020" opacity="0.7"><animate attributeName="fill" values="#ff6020;#ffcc00;#0040a0;#ff6020" dur="4.0s" begin="0.8s" repeatCount="indefinite"/></rect>
  <rect x="750" y="78" width="16" height="20" rx="3" fill="#0af0ff" opacity="0.8"><animate attributeName="fill" values="#0af0ff;#ff6020;#ffcc00;#0af0ff" dur="3.4s" begin="1.1s" repeatCount="indefinite"/></rect>
  <rect x="770" y="78" width="16" height="20" rx="3" fill="#ffcc00" opacity="0.9"><animate attributeName="fill" values="#ffcc00;#0040a0;#ff6020;#ffcc00" dur="4.6s" begin="0.6s" repeatCount="indefinite"/></rect>

  <!-- Text backdrop -->
  <rect x="148" y="30" width="504" height="62" rx="7" fill="#030508" opacity="0.60"/>

  <!-- Project name text -->
  <text x="400" y="56" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#f0faff" text-anchor="middle" letter-spacing="4">
    aws-util-python<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="81" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#ffcc00" text-anchor="middle" letter-spacing="1">
    Production-ready Python wrappers for 100+ AWS services<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
