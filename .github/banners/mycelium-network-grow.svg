<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="myc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040a07"/>
      <stop offset="50%" stop-color="#071310"/>
      <stop offset="100%" stop-color="#040a07"/>
    </linearGradient>
    <!-- Pulse glow filter -->
    <filter id="myc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="myc-glow-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#myc-bg)"/>

  <!-- Subtle ground texture dots -->
  <g opacity="0.15">
    <circle cx="60" cy="110" r="1" fill="#1a3d2a"/>
    <circle cx="140" cy="108" r="0.8" fill="#1a3d2a"/>
    <circle cx="220" cy="112" r="1.2" fill="#1a3d2a"/>
    <circle cx="580" cy="110" r="1" fill="#1a3d2a"/>
    <circle cx="660" cy="109" r="0.8" fill="#1a3d2a"/>
    <circle cx="740" cy="111" r="1" fill="#1a3d2a"/>
  </g>

  <!-- Mycelium thread network — left cluster -->
  <g filter="url(#myc-glow)" opacity="0.85">
    <!-- Main trunk threads left -->
    <line x1="50" y1="100" x2="100" y2="75" stroke="#22c55e" stroke-width="0.8" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0.4;0.6" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="75" x2="140" y2="55" stroke="#22c55e" stroke-width="0.7">
      <animate attributeName="opacity" values="0;0;0.5;0.5;0.3;0.5" dur="5s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="100" y1="75" x2="145" y2="80" stroke="#16a34a" stroke-width="0.6">
      <animate attributeName="opacity" values="0;0;0.4;0.4" dur="4.5s" repeatCount="indefinite" begin="0.8s"/>
    </line>
    <line x1="140" y1="55" x2="180" y2="40" stroke="#4ade80" stroke-width="0.7">
      <animate attributeName="opacity" values="0;0;0;0.6;0.6;0.4" dur="6s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="140" y1="55" x2="175" y2="65" stroke="#22c55e" stroke-width="0.5">
      <animate attributeName="opacity" values="0;0;0;0.5;0.5" dur="5.5s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="50" y1="100" x2="75" y2="95" stroke="#16a34a" stroke-width="0.6">
      <animate attributeName="opacity" values="0;0.5;0.3;0.5" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="75" y1="95" x2="120" y2="92" stroke="#15803d" stroke-width="0.5">
      <animate attributeName="opacity" values="0;0;0.4;0.4" dur="4s" repeatCount="indefinite" begin="0.9s"/>
    </line>
  </g>

  <!-- Mycelium thread network — right cluster -->
  <g filter="url(#myc-glow)" opacity="0.85">
    <line x1="750" y1="100" x2="700" y2="75" stroke="#22c55e" stroke-width="0.8" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0.4;0.6" dur="4.2s" repeatCount="indefinite" begin="0.4s"/>
    </line>
    <line x1="700" y1="75" x2="660" y2="55" stroke="#22c55e" stroke-width="0.7">
      <animate attributeName="opacity" values="0;0;0.5;0.5;0.3;0.5" dur="5.2s" repeatCount="indefinite" begin="0.7s"/>
    </line>
    <line x1="700" y1="75" x2="655" y2="82" stroke="#16a34a" stroke-width="0.6">
      <animate attributeName="opacity" values="0;0;0.4;0.4" dur="4.7s" repeatCount="indefinite" begin="1.1s"/>
    </line>
    <line x1="660" y1="55" x2="620" y2="40" stroke="#4ade80" stroke-width="0.7">
      <animate attributeName="opacity" values="0;0;0;0.6;0.6;0.4" dur="6.2s" repeatCount="indefinite" begin="0.9s"/>
    </line>
    <line x1="660" y1="55" x2="625" y2="68" stroke="#22c55e" stroke-width="0.5">
      <animate attributeName="opacity" values="0;0;0;0.5;0.5" dur="5.7s" repeatCount="indefinite" begin="1.3s"/>
    </line>
    <line x1="750" y1="100" x2="725" y2="96" stroke="#16a34a" stroke-width="0.6">
      <animate attributeName="opacity" values="0;0.5;0.3;0.5" dur="3.7s" repeatCount="indefinite" begin="0.6s"/>
    </line>
  </g>

  <!-- Spore nodes — left -->
  <g filter="url(#myc-glow-soft)">
    <circle cx="100" cy="75" r="2.5" fill="#4ade80">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.7;0.9" dur="4s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="140" cy="55" r="2" fill="#86efac">
      <animate attributeName="r" values="2;3;2" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0;0.8;0.6;0.8" dur="5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="180" cy="40" r="1.8" fill="#22d3ee">
      <animate attributeName="r" values="1.8;2.8;1.8" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0;0;0.7;0.5;0.7" dur="6s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="50" cy="100" r="3" fill="#15803d">
      <animate attributeName="r" values="3;4;3" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="95" r="1.5" fill="#4ade80">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="3.2s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0.7" dur="4.2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="145" cy="80" r="1.5" fill="#86efac">
      <animate attributeName="r" values="1.5;2.2;1.5" dur="3.8s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="5s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <circle cx="175" cy="65" r="1.3" fill="#22d3ee">
      <animate attributeName="r" values="1.3;2;1.3" dur="3.6s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0;0;0.6;0.6" dur="5.5s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
  </g>

  <!-- Spore nodes — right -->
  <g filter="url(#myc-glow-soft)">
    <circle cx="700" cy="75" r="2.5" fill="#4ade80">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="3.2s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;0.9;0.7;0.9" dur="4.2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="660" cy="55" r="2" fill="#86efac">
      <animate attributeName="r" values="2;3;2" dur="3.7s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="opacity" values="0;0;0.8;0.6;0.8" dur="5.2s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="620" cy="40" r="1.8" fill="#22d3ee">
      <animate attributeName="r" values="1.8;2.8;1.8" dur="4.2s" repeatCount="indefinite" begin="1.3s"/>
      <animate attributeName="opacity" values="0;0;0;0.7;0.5;0.7" dur="6.2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="750" cy="100" r="3" fill="#15803d">
      <animate attributeName="r" values="3;4;3" dur="4.7s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="725" cy="96" r="1.5" fill="#4ade80">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="3.4s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0.7" dur="4.4s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="655" cy="82" r="1.5" fill="#86efac">
      <animate attributeName="r" values="1.5;2.2;1.5" dur="4s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="5.2s" repeatCount="indefinite" begin="1.7s"/>
    </circle>
    <circle cx="625" cy="68" r="1.3" fill="#22d3ee">
      <animate attributeName="r" values="1.3;2;1.3" dur="3.8s" repeatCount="indefinite" begin="1.8s"/>
      <animate attributeName="opacity" values="0;0;0;0.6;0.6" dur="5.7s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <!-- Traveling pulse particles on threads — left -->
  <g filter="url(#myc-glow)">
    <circle cx="0" cy="0" r="2" fill="#a7f3d0" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite" begin="1s">
        <mpath href="#myc-path-l1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#6ee7b7" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" begin="2.5s">
        <mpath href="#myc-path-l2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
  </g>

  <!-- Paths for particle motion -->
  <defs>
    <path id="myc-path-l1" d="M50,100 L100,75 L140,55 L180,40"/>
    <path id="myc-path-l2" d="M100,75 L140,55 L175,65"/>
    <path id="myc-path-r1" d="M750,100 L700,75 L660,55 L620,40"/>
    <path id="myc-path-r2" d="M700,75 L660,55 L625,68"/>
  </defs>

  <!-- Traveling pulse particles on threads — right -->
  <g filter="url(#myc-glow)">
    <circle cx="0" cy="0" r="2" fill="#a7f3d0" opacity="0.9">
      <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.8s">
        <mpath href="#myc-path-r1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.2s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#6ee7b7" opacity="0.8">
      <animateMotion dur="4.2s" repeatCount="indefinite" begin="3s">
        <mpath href="#myc-path-r2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.2s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>

  <!-- Floating spore motes -->
  <g opacity="0.6">
    <circle cx="250" cy="30" r="1" fill="#4ade80">
      <animate attributeName="cy" values="30;22;30" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="20" r="0.8" fill="#22d3ee">
      <animate attributeName="cy" values="20;14;20" dur="6s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.5;0.3;0.5" dur="6s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="500" cy="25" r="1" fill="#4ade80">
      <animate attributeName="cy" values="25;18;25" dur="5.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0.6" dur="5.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="550" cy="15" r="0.8" fill="#86efac">
      <animate attributeName="cy" values="15;9;15" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.5;0.3;0.5" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- Text overlay backing -->
  <rect x="200" y="28" width="400" height="65" rx="8" fill="#040a07" opacity="0.72"/>

  <!-- Author text -->
  <text x="400" y="58" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#86efac" text-anchor="middle" letter-spacing="3">
    Masrik Dahir
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="82" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#22d3ee" text-anchor="middle" letter-spacing="2">
    ✦ masrikdahir.com ✦
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
