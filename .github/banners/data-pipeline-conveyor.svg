<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="dpc-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c1117"/>
      <stop offset="50%" stop-color="#141c26"/>
      <stop offset="100%" stop-color="#0c1117"/>
    </linearGradient>
    <!-- Stage colors -->
    <linearGradient id="dpc-stage-ingest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="dpc-stage-transform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="dpc-stage-load" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Block glows -->
    <linearGradient id="dpc-block-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="dpc-block-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="dpc-block-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#dpc-bg)"/>

  <!-- Conveyor belt tracks (top and bottom rails) -->
  <rect x="30" y="90" width="740" height="4" rx="2" fill="#2d3748" opacity="0.8"/>
  <rect x="30" y="96" width="740" height="3" rx="1.5" fill="#1a2030" opacity="0.6"/>
  <!-- Belt tick marks -->
  <g stroke="#374151" stroke-width="1" opacity="0.5">
    <line x1="50" y1="90" x2="50" y2="99"/>
    <line x1="90" y1="90" x2="90" y2="99"/>
    <line x1="130" y1="90" x2="130" y2="99"/>
    <line x1="170" y1="90" x2="170" y2="99"/>
    <line x1="210" y1="90" x2="210" y2="99"/>
    <line x1="250" y1="90" x2="250" y2="99"/>
    <line x1="290" y1="90" x2="290" y2="99"/>
    <line x1="330" y1="90" x2="330" y2="99"/>
    <line x1="370" y1="90" x2="370" y2="99"/>
    <line x1="410" y1="90" x2="410" y2="99"/>
    <line x1="450" y1="90" x2="450" y2="99"/>
    <line x1="490" y1="90" x2="490" y2="99"/>
    <line x1="530" y1="90" x2="530" y2="99"/>
    <line x1="570" y1="90" x2="570" y2="99"/>
    <line x1="610" y1="90" x2="610" y2="99"/>
    <line x1="650" y1="90" x2="650" y2="99"/>
    <line x1="690" y1="90" x2="690" y2="99"/>
    <line x1="730" y1="90" x2="730" y2="99"/>
  </g>
  <!-- Rollers at each end -->
  <circle cx="30" cy="93" r="8" fill="#2d3748" stroke="#4b5563" stroke-width="1.2"/>
  <circle cx="770" cy="93" r="8" fill="#2d3748" stroke="#4b5563" stroke-width="1.2"/>

  <!-- Stage labels (background panels) -->
  <!-- INGEST stage -->
  <rect x="32" y="10" width="140" height="76" rx="5" fill="#1a1f2e" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
  <rect x="32" y="10" width="140" height="16" rx="5" fill="url(#dpc-stage-ingest)" opacity="0.9"/>
  <text x="102" y="22" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700"
        fill="#0c1117" text-anchor="middle" letter-spacing="1">INGEST</text>
  <!-- TRANSFORM stage -->
  <rect x="192" y="10" width="220" height="76" rx="5" fill="#1a1f2e" stroke="#10b981" stroke-width="0.8" opacity="0.7"/>
  <rect x="192" y="10" width="220" height="16" rx="5" fill="url(#dpc-stage-transform)" opacity="0.9"/>
  <text x="302" y="22" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700"
        fill="#0c1117" text-anchor="middle" letter-spacing="1">TRANSFORM</text>
  <!-- LOAD stage -->
  <rect x="432" y="10" width="336" height="76" rx="5" fill="#1a1f2e" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <rect x="432" y="10" width="336" height="16" rx="5" fill="url(#dpc-stage-load)" opacity="0.9"/>
  <text x="600" y="22" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700"
        fill="#0c1117" text-anchor="middle" letter-spacing="1">LOAD</text>

  <!-- Arrow connectors between stages -->
  <polygon points="182,48 192,55 182,62" fill="#f59e0b" opacity="0.7"/>
  <polygon points="422,48 432,55 422,62" fill="#10b981" opacity="0.7"/>

  <!-- ===== Animated data blocks traveling along the belt ===== -->
  <!-- Block A: amber, ingest → transform -->
  <g>
    <rect x="0" y="70" width="40" height="18" rx="3" fill="url(#dpc-block-amber)" opacity="0.92">
      <animate attributeName="x" values="-50;780" dur="4.8s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <text x="0" y="82" font-family="'Segoe UI',monospace" font-size="7" fill="#0c1117" text-anchor="middle" font-weight="700">
      S3<animate attributeName="x" values="-30;800" dur="4.8s" repeatCount="indefinite" calcMode="linear"/>
    </text>
  </g>
  <!-- Block B: green, transform phase — offset start -->
  <g>
    <rect x="0" y="70" width="44" height="18" rx="3" fill="url(#dpc-block-green)" opacity="0.92">
      <animate attributeName="x" values="-50;780" dur="4.8s" begin="1.6s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <text x="0" y="82" font-family="'Segoe UI',monospace" font-size="7" fill="#0c1117" text-anchor="middle" font-weight="700">
      GLUE<animate attributeName="x" values="-28;802" dur="4.8s" begin="1.6s" repeatCount="indefinite" calcMode="linear"/>
    </text>
  </g>
  <!-- Block C: blue, load phase — further offset -->
  <g>
    <rect x="0" y="70" width="46" height="18" rx="3" fill="url(#dpc-block-blue)" opacity="0.92">
      <animate attributeName="x" values="-50;780" dur="4.8s" begin="3.2s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <text x="0" y="82" font-family="'Segoe UI',monospace" font-size="7" fill="#0c1117" text-anchor="middle" font-weight="700">
      DDB<animate attributeName="x" values="-27;803" dur="4.8s" begin="3.2s" repeatCount="indefinite" calcMode="linear"/>
    </text>
  </g>
  <!-- Tiny block D: amber, fast mini packet -->
  <rect x="0" y="72" width="22" height="14" rx="2" fill="#fbbf24" opacity="0.75">
    <animate attributeName="x" values="-30;780" dur="3.0s" begin="0.8s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
  <!-- Tiny block E: blue micro packet -->
  <rect x="0" y="74" width="18" height="10" rx="2" fill="#60a5fa" opacity="0.65">
    <animate attributeName="x" values="-25;780" dur="3.6s" begin="2.4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- Text backdrop -->
  <rect x="200" y="26" width="400" height="40" rx="6" fill="#000000" opacity="0.40"/>

  <!-- Project title text -->
  <text x="400" y="50" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#f0fffe" text-anchor="middle" letter-spacing="4">
    aws-util<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="66" font-family="'Segoe UI',sans-serif" font-size="11"
        fill="#34d399" text-anchor="middle" letter-spacing="1">
    Multi-service Python library for AWS automation<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
