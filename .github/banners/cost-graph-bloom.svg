<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="cgb-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cgb-bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="cgb-bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="cgb-bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="cgb-bar4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cgb-bar5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="cgb-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#cgb-bg)"/>

  <!-- Grid lines -->
  <line x1="60" y1="15" x2="340" y2="15" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="60" y1="35" x2="340" y2="35" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="60" y1="55" x2="340" y2="55" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="60" y1="75" x2="340" y2="75" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="60" y1="95" x2="340" y2="95" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="60" y1="10" x2="60" y2="100" stroke="#374151" stroke-width="0.8"/>

  <!-- Bar 1 — EC2 (green) -->
  <rect x="75" y="95" width="28" height="0" fill="url(#cgb-bar1)" rx="2" filter="url(#cgb-glow)">
    <animate attributeName="height" values="0;55" dur="1.2s" begin="0.1s" fill="freeze"/>
    <animate attributeName="y" values="95;40" dur="1.2s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Bar 2 — S3 (blue) -->
  <rect x="112" y="95" width="28" height="0" fill="url(#cgb-bar2)" rx="2" filter="url(#cgb-glow)">
    <animate attributeName="height" values="0;40" dur="1.2s" begin="0.3s" fill="freeze"/>
    <animate attributeName="y" values="95;55" dur="1.2s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Bar 3 — Lambda (amber) -->
  <rect x="149" y="95" width="28" height="0" fill="url(#cgb-bar3)" rx="2" filter="url(#cgb-glow)">
    <animate attributeName="height" values="0;68" dur="1.2s" begin="0.5s" fill="freeze"/>
    <animate attributeName="y" values="95;27" dur="1.2s" begin="0.5s" fill="freeze"/>
  </rect>

  <!-- Bar 4 — RDS (purple) -->
  <rect x="186" y="95" width="28" height="0" fill="url(#cgb-bar4)" rx="2" filter="url(#cgb-glow)">
    <animate attributeName="height" values="0;30" dur="1.2s" begin="0.7s" fill="freeze"/>
    <animate attributeName="y" values="95;65" dur="1.2s" begin="0.7s" fill="freeze"/>
  </rect>

  <!-- Bar 5 — WAF (red) -->
  <rect x="223" y="95" width="28" height="0" fill="url(#cgb-bar5)" rx="2" filter="url(#cgb-glow)">
    <animate attributeName="height" values="0;48" dur="1.2s" begin="0.9s" fill="freeze"/>
    <animate attributeName="y" values="95;47" dur="1.2s" begin="0.9s" fill="freeze"/>
  </rect>

  <!-- Bar 6 — CF (blue teal) -->
  <rect x="260" y="95" width="28" height="0" fill="url(#cgb-bar2)" rx="2" filter="url(#cgb-glow)" opacity="0.7">
    <animate attributeName="height" values="0;20" dur="1.2s" begin="1.1s" fill="freeze"/>
    <animate attributeName="y" values="95;75" dur="1.2s" begin="1.1s" fill="freeze"/>
  </rect>

  <!-- Trend line overlay -->
  <polyline points="89,40 126,55 163,27 200,65 237,47 274,75" fill="none" stroke="#f9fafb" stroke-width="1" stroke-dasharray="3,3" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="1.4s" fill="freeze"/>
  </polyline>

  <!-- Sparkle dots on top of bars -->
  <circle cx="89" cy="40" r="3" fill="#34d399" filter="url(#cgb-glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="163" cy="27" r="3" fill="#fcd34d" filter="url(#cgb-glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="237" cy="47" r="3" fill="#f87171" filter="url(#cgb-glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.7s" fill="freeze"/>
    <animate attributeName="r" values="3;5;3" dur="2.3s" begin="1.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Right-side grid (savings pie arcs) -->
  <!-- Savings plan coverage arc background -->
  <circle cx="620" cy="60" r="42" fill="none" stroke="#1f2937" stroke-width="10"/>
  <!-- Coverage filled arc (73%) -->
  <circle cx="620" cy="60" r="42" fill="none" stroke="#10b981" stroke-width="10"
          stroke-dasharray="0 264" stroke-linecap="round" transform="rotate(-90,620,60)" filter="url(#cgb-glow)">
    <animate attributeName="stroke-dasharray" values="0 264;193 71" dur="1.5s" begin="0.5s" fill="freeze"/>
  </circle>
  <!-- Uncovered arc -->
  <circle cx="620" cy="60" r="42" fill="none" stroke="#f59e0b" stroke-width="10"
          stroke-dasharray="0 264" stroke-dashoffset="-193" stroke-linecap="round" transform="rotate(-90,620,60)">
    <animate attributeName="stroke-dasharray" values="0 264;71 193" dur="1.5s" begin="0.8s" fill="freeze"/>
  </circle>
  <!-- Center label -->
  <text x="620" y="55" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700"
        fill="#10b981" text-anchor="middle" opacity="0">
    73%<animate attributeName="opacity" values="0;1" dur="0.4s" begin="2s" fill="freeze"/>
  </text>
  <text x="620" y="70" font-family="'Segoe UI',sans-serif" font-size="9"
        fill="#9ca3af" text-anchor="middle" opacity="0">
    covered<animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.1s" fill="freeze"/>
  </text>

  <!-- Small cost labels right side -->
  <text x="675" y="35" font-family="'Segoe UI',sans-serif" font-size="9" fill="#34d399" opacity="0">
    EC2<animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
  </text>
  <text x="675" y="50" font-family="'Segoe UI',sans-serif" font-size="9" fill="#60a5fa" opacity="0">
    S3<animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </text>
  <text x="675" y="65" font-family="'Segoe UI',sans-serif" font-size="9" fill="#fcd34d" opacity="0">
    Lambda<animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.4s" fill="freeze"/>
  </text>
  <text x="675" y="80" font-family="'Segoe UI',sans-serif" font-size="9" fill="#a78bfa" opacity="0">
    RDS<animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
  </text>

  <!-- Text backdrop -->
  <rect x="330" y="28" width="260" height="65" rx="8" fill="#000000" opacity="0.55"/>

  <!-- Project name text -->
  <text x="460" y="58" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700"
        fill="#f9fafb" text-anchor="middle" letter-spacing="3">
    aws-util<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="460" y="82" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#10b981" text-anchor="middle" letter-spacing="1">
    Multi-service AWS automation for Python engineers<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
