<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="cms-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#030811"/>
      <stop offset="50%" stop-color="#060e20"/>
      <stop offset="100%" stop-color="#030811"/>
    </linearGradient>
    <linearGradient id="cms-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <filter id="cms-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cms-left-clip">
      <rect x="0" y="0" width="220" height="120"/>
    </clipPath>
    <clipPath id="cms-right-clip">
      <rect x="580" y="0" width="220" height="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#cms-bg)"/>

  <!-- Left compliance matrix grid (7 cols × 4 rows) -->
  <g clip-path="url(#cms-left-clip)" filter="url(#cms-glow)">
    <!-- Grid lines vertical -->
    <g stroke="#0a3a20" stroke-width="0.5">
      <line x1="10" y1="8" x2="10" y2="112"/><line x1="40" y1="8" x2="40" y2="112"/>
      <line x1="70" y1="8" x2="70" y2="112"/><line x1="100" y1="8" x2="100" y2="112"/>
      <line x1="130" y1="8" x2="130" y2="112"/><line x1="160" y1="8" x2="160" y2="112"/>
      <line x1="190" y1="8" x2="190" y2="112"/><line x1="220" y1="8" x2="220" y2="112"/>
    </g>
    <!-- Grid lines horizontal -->
    <g stroke="#0a3a20" stroke-width="0.5">
      <line x1="10" y1="8" x2="220" y2="8"/><line x1="10" y1="36" x2="220" y2="36"/>
      <line x1="10" y1="64" x2="220" y2="64"/><line x1="10" y1="92" x2="220" y2="92"/>
      <line x1="10" y1="112" x2="220" y2="112"/>
    </g>
    <!-- PASS cells (green checkmarks) -->
    <g fill="none" stroke="#00ff88" stroke-width="1.5">
      <!-- Row 1 -->
      <polyline points="17,20 22,26 33,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0s" repeatCount="indefinite"/></polyline>
      <polyline points="47,20 52,26 63,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.3s" repeatCount="indefinite"/></polyline>
      <polyline points="107,20 112,26 123,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.6s" repeatCount="indefinite"/></polyline>
      <polyline points="167,20 172,26 183,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.2s" repeatCount="indefinite"/></polyline>
      <!-- Row 2 -->
      <polyline points="17,48 22,54 33,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.8s" repeatCount="indefinite"/></polyline>
      <polyline points="77,48 82,54 93,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.4s" repeatCount="indefinite"/></polyline>
      <polyline points="137,48 142,54 153,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1s" repeatCount="indefinite"/></polyline>
      <polyline points="197,48 202,54 213,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/></polyline>
      <!-- Row 3 -->
      <polyline points="47,76 52,82 63,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1.2s" repeatCount="indefinite"/></polyline>
      <polyline points="107,76 112,82 123,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.7s" repeatCount="indefinite"/></polyline>
      <polyline points="167,76 172,82 183,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.1s" repeatCount="indefinite"/></polyline>
      <!-- Row 4 -->
      <polyline points="17,100 22,106 33,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/></polyline>
      <polyline points="77,100 82,106 93,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.9s" repeatCount="indefinite"/></polyline>
      <polyline points="137,100 142,106 153,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.3s" repeatCount="indefinite"/></polyline>
      <polyline points="197,100 202,106 213,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1.1s" repeatCount="indefinite"/></polyline>
    </g>
    <!-- FAIL cells (red X) -->
    <g stroke="#ff3344" stroke-width="1.5">
      <line x1="77" y1="14" x2="93" y2="26"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/></line>
      <line x1="93" y1="14" x2="77" y2="26"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/></line>
      <line x1="137" y1="42" x2="153" y2="54"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="1.2s" repeatCount="indefinite"/></line>
      <line x1="153" y1="42" x2="137" y2="54"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="1.2s" repeatCount="indefinite"/></line>
      <line x1="17" y1="70" x2="33" y2="82"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></line>
      <line x1="33" y1="70" x2="17" y2="82"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></line>
    </g>
    <!-- Sweep bar left -->
    <rect x="-30" y="0" width="60" height="120" fill="url(#cms-sweep)">
      <animate attributeName="x" values="-30;250;-30" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right compliance matrix grid (mirrored) -->
  <g clip-path="url(#cms-right-clip)" filter="url(#cms-glow)">
    <g stroke="#0a3a20" stroke-width="0.5">
      <line x1="580" y1="8" x2="580" y2="112"/><line x1="610" y1="8" x2="610" y2="112"/>
      <line x1="640" y1="8" x2="640" y2="112"/><line x1="670" y1="8" x2="670" y2="112"/>
      <line x1="700" y1="8" x2="700" y2="112"/><line x1="730" y1="8" x2="730" y2="112"/>
      <line x1="760" y1="8" x2="760" y2="112"/><line x1="790" y1="8" x2="790" y2="112"/>
    </g>
    <g stroke="#0a3a20" stroke-width="0.5">
      <line x1="580" y1="8" x2="790" y2="8"/><line x1="580" y1="36" x2="790" y2="36"/>
      <line x1="580" y1="64" x2="790" y2="64"/><line x1="580" y1="92" x2="790" y2="92"/>
      <line x1="580" y1="112" x2="790" y2="112"/>
    </g>
    <g fill="none" stroke="#00ff88" stroke-width="1.5">
      <polyline points="587,20 592,26 603,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.2s" repeatCount="indefinite"/></polyline>
      <polyline points="647,20 652,26 663,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.7s" repeatCount="indefinite"/></polyline>
      <polyline points="707,20 712,26 723,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.4s" repeatCount="indefinite"/></polyline>
      <polyline points="767,20 772,26 783,14"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.9s" repeatCount="indefinite"/></polyline>
      <polyline points="617,48 622,54 633,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.1s" repeatCount="indefinite"/></polyline>
      <polyline points="677,48 682,54 693,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.6s" repeatCount="indefinite"/></polyline>
      <polyline points="737,48 742,54 753,42"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1.1s" repeatCount="indefinite"/></polyline>
      <polyline points="587,76 592,82 603,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/></polyline>
      <polyline points="707,76 712,82 723,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.3s" repeatCount="indefinite"/></polyline>
      <polyline points="767,76 772,82 783,70"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.8s" repeatCount="indefinite"/></polyline>
      <polyline points="617,100 622,106 633,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1.3s" repeatCount="indefinite"/></polyline>
      <polyline points="677,100 682,106 693,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="0.4s" repeatCount="indefinite"/></polyline>
      <polyline points="767,100 772,106 783,94"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3s" begin="1s" repeatCount="indefinite"/></polyline>
    </g>
    <g stroke="#ff3344" stroke-width="1.5">
      <line x1="647" y1="42" x2="663" y2="54"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.9s" repeatCount="indefinite"/></line>
      <line x1="663" y1="42" x2="647" y2="54"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.9s" repeatCount="indefinite"/></line>
      <line x1="737" y1="70" x2="753" y2="82"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.4s" repeatCount="indefinite"/></line>
      <line x1="753" y1="70" x2="737" y2="82"><animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" begin="0.4s" repeatCount="indefinite"/></line>
    </g>
    <!-- Sweep bar right -->
    <rect x="550" y="0" width="60" height="120" fill="url(#cms-sweep)">
      <animate attributeName="x" values="820;550;820" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Center text panel -->
  <rect x="215" y="28" width="370" height="66" rx="7" fill="#000000" opacity="0.6"/>

  <!-- Project name -->
  <text x="400" y="55" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700"
        fill="#e8fff2" text-anchor="middle" letter-spacing="3">
    aws-util-python
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <!-- Tagline -->
  <text x="400" y="79" font-family="'Segoe UI',sans-serif" font-size="11.5"
        fill="#00ff88" text-anchor="middle" letter-spacing="1.5">
    Multi-service AWS operations wrapped in one Python library
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
