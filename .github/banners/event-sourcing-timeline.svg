<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="est-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#060b14"/>
      <stop offset="50%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#060b14"/>
    </linearGradient>
    <filter id="est-glow-teal" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="est-glow-amber" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="est-glow-violet" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="est-clip-left">
      <rect x="0" y="0" width="200" height="120"/>
    </clipPath>
    <clipPath id="est-clip-right">
      <rect x="600" y="0" width="200" height="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#est-bg)"/>

  <!-- ============ LEFT TIMELINE ============ -->
  <!-- Horizontal timeline bar (left) -->
  <line x1="20" y1="60" x2="195" y2="60" stroke="#1e3a4a" stroke-width="1.5"/>
  <!-- Timeline bar animated fill -->
  <line x1="20" y1="60" x2="20" y2="60" stroke="#22d3ee" stroke-width="1.5" opacity="0.7">
    <animate attributeName="x2" values="20;195" dur="2s" fill="freeze"/>
  </line>

  <!-- Left timeline events -->
  <!-- Event 1: teal at x=45 -->
  <circle cx="45" cy="60" r="0" fill="#22d3ee" filter="url(#est-glow-teal)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="0.4s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="60" r="0" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="0.4s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="0.4s" fill="freeze"/>
  </circle>
  <text x="45" y="42" font-family="'Segoe UI',sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle" opacity="0">
    PUT
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
  </text>
  <line x1="45" y1="55" x2="45" y2="48" stroke="#22d3ee" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="0.7s" fill="freeze"/>
  </line>

  <!-- Event 2: amber at x=90 -->
  <circle cx="90" cy="60" r="0" fill="#f59e0b" filter="url(#est-glow-amber)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2.3s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="60" r="0" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="0.8s" fill="freeze"/>
  </circle>
  <text x="90" y="82" font-family="'Segoe UI',sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0">
    SNAP
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
  </text>
  <line x1="90" y1="65" x2="90" y2="76" stroke="#f59e0b" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="1.1s" fill="freeze"/>
  </line>

  <!-- Event 3: violet at x=140 -->
  <circle cx="140" cy="60" r="0" fill="#a78bfa" filter="url(#est-glow-violet)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="1.9s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="60" r="0" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="1.3s" fill="freeze"/>
  </circle>
  <text x="140" y="42" font-family="'Segoe UI',sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0">
    CMD
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>
  <line x1="140" y1="55" x2="140" y2="48" stroke="#a78bfa" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="1.6s" fill="freeze"/>
  </line>

  <!-- Event 4: teal at x=180 -->
  <circle cx="180" cy="60" r="0" fill="#22d3ee" filter="url(#est-glow-teal)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="1.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2.1s" begin="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="60" r="0" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="1.8s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="1.8s" fill="freeze"/>
  </circle>
  <text x="180" y="82" font-family="'Segoe UI',sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle" opacity="0">
    EVT
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.1s" fill="freeze"/>
  </text>
  <line x1="180" y1="65" x2="180" y2="76" stroke="#22d3ee" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="2.1s" fill="freeze"/>
  </line>

  <!-- Traveling replay dot (left side) -->
  <circle cx="20" cy="60" r="3.5" fill="#22d3ee" opacity="0" filter="url(#est-glow-teal)">
    <animate attributeName="cx" values="20;195" dur="3s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ============ RIGHT TIMELINE ============ -->
  <!-- Horizontal timeline bar (right) -->
  <line x1="605" y1="60" x2="780" y2="60" stroke="#1e3a4a" stroke-width="1.5"/>
  <line x1="605" y1="60" x2="605" y2="60" stroke="#a78bfa" stroke-width="1.5" opacity="0.7">
    <animate attributeName="x2" values="605;780" dur="2s" begin="0.2s" fill="freeze"/>
  </line>

  <!-- Right timeline events -->
  <!-- Event R1: amber at x=625 -->
  <circle cx="625" cy="60" r="0" fill="#f59e0b" filter="url(#est-glow-amber)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="0.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="625" cy="60" r="0" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="0.6s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="0.6s" fill="freeze"/>
  </circle>
  <text x="625" y="42" font-family="'Segoe UI',sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0">
    PUT
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
  </text>
  <line x1="625" y1="55" x2="625" y2="48" stroke="#f59e0b" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- Event R2: teal at x=665 -->
  <circle cx="665" cy="60" r="0" fill="#22d3ee" filter="url(#est-glow-teal)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="1.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="665" cy="60" r="0" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="1.0s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="1.0s" fill="freeze"/>
  </circle>
  <text x="665" y="82" font-family="'Segoe UI',sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle" opacity="0">
    EVT
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
  </text>
  <line x1="665" y1="65" x2="665" y2="76" stroke="#22d3ee" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="1.3s" fill="freeze"/>
  </line>

  <!-- Event R3: violet at x=710 -->
  <circle cx="710" cy="60" r="0" fill="#a78bfa" filter="url(#est-glow-violet)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="1.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2.4s" begin="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="710" cy="60" r="0" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="1.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="1.5s" fill="freeze"/>
  </circle>
  <text x="710" y="42" font-family="'Segoe UI',sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0">
    SNAP
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
  </text>
  <line x1="710" y1="55" x2="710" y2="48" stroke="#a78bfa" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="1.8s" fill="freeze"/>
  </line>

  <!-- Event R4: amber at x=755 -->
  <circle cx="755" cy="60" r="0" fill="#f59e0b" filter="url(#est-glow-amber)">
    <animate attributeName="r" values="0;5;5" dur="0.4s" begin="2.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2.1s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="755" cy="60" r="0" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;18;18" dur="1.2s" begin="2.0s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0;0" dur="1.2s" begin="2.0s" fill="freeze"/>
  </circle>
  <text x="755" y="82" font-family="'Segoe UI',sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0">
    CMD
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </text>
  <line x1="755" y1="65" x2="755" y2="76" stroke="#f59e0b" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="2.3s" fill="freeze"/>
  </line>

  <!-- Traveling replay dot (right side) -->
  <circle cx="605" cy="60" r="3.5" fill="#a78bfa" opacity="0" filter="url(#est-glow-violet)">
    <animate attributeName="cx" values="605;780" dur="3s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Text overlay -->
  <rect x="230" y="28" width="340" height="68" rx="8" fill="#000000" opacity="0.45"/>

  <text x="400" y="60" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#f8fafc" text-anchor="middle" letter-spacing="4">
    aws-util
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="83" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#22d3ee" text-anchor="middle" letter-spacing="1">
    120+ AWS services. Typed results. Sync and async.
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
