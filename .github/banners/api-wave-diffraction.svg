<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="awdi-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="50%" stop-color="#040d24"/>
      <stop offset="100%" stop-color="#020818"/>
    </linearGradient>
    <linearGradient id="awdi-wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="awdi-wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#7c4dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="awdi-wave3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00ff9d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#awdi-bg)"/>

  <!-- Aperture slit — left barrier -->
  <rect x="0" y="0" width="185" height="46" fill="#0a1628" opacity="0.9"/>
  <rect x="0" y="74" width="185" height="46" fill="#0a1628" opacity="0.9"/>
  <!-- Slit gap highlight edges -->
  <line x1="185" y1="46" x2="185" y2="74" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>

  <!-- Incoming parallel wavefronts (left side) -->
  <g opacity="0.7">
    <line x1="30" y1="46" x2="30" y2="74" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="46" x2="60" y2="74" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="46" x2="90" y2="74" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="46" x2="120" y2="74" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="46" x2="150" y2="74" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Diffracted semicircular wavefronts emanating from slit -->
  <!-- First ring -->
  <path d="M185,60 Q215,35 245,60 Q215,85 185,60" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.0s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M185,60 Q185,60 185,60;M185,60 Q215,35 245,60 Q215,85 185,60;M185,60 Q245,15 305,60 Q245,105 185,60" dur="2.0s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q215,35 245,60 Q215,85 185,60" fill="none" stroke="#7c4dff" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.0s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M185,60 Q185,60 185,60;M185,60 Q215,35 245,60 Q215,85 185,60;M185,60 Q245,15 305,60 Q245,105 185,60" dur="2.0s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q215,35 245,60 Q215,85 185,60" fill="none" stroke="#00ff9d" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="2.0s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M185,60 Q185,60 185,60;M185,60 Q215,35 245,60 Q215,85 185,60;M185,60 Q245,15 305,60 Q245,105 185,60" dur="2.0s" begin="1.0s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q215,35 245,60 Q215,85 185,60" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="2.0s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M185,60 Q185,60 185,60;M185,60 Q215,35 245,60 Q215,85 185,60;M185,60 Q245,15 305,60 Q245,105 185,60" dur="2.0s" begin="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Wider diffraction fans spreading to full height -->
  <path d="M185,60 Q310,10 435,60 Q310,110 185,60" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="2.4s" begin="0.2s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q310,10 435,60 Q310,110 185,60" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.25;0" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q330,5 475,60 Q330,115 185,60" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q380,2 575,60 Q380,118 185,60" fill="none" stroke="#00ff9d" stroke-width="0.6" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q420,0 660,60 Q420,120 185,60" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.14;0" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
  </path>
  <path d="M185,60 Q440,0 720,60 Q440,120 185,60" fill="none" stroke="#7c4dff" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.12;0" dur="4.0s" begin="1.1s" repeatCount="indefinite"/>
  </path>

  <!-- Floating wave label on left -->
  <text x="96" y="22" font-family="'Courier New',monospace" font-size="8" fill="#00e5ff" text-anchor="middle" opacity="0.5">λ₁ λ₂ λ₃</text>

  <!-- Text backdrop -->
  <rect x="195" y="32" width="415" height="58" rx="6" fill="#000000" opacity="0.38"/>

  <!-- Author text -->
  <text x="400" y="56" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="700"
        fill="#e8f4ff" text-anchor="middle" letter-spacing="3">
    Masrik Dahir
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="78" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#00e5ff" text-anchor="middle" letter-spacing="2">
    ✦ masrikdahir.com ✦
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Right side interference nodes (constructive/destructive) -->
  <circle cx="640" cy="22" r="3" fill="#00ff9d" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;5;2" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="40" r="3" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.9s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="1.9s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="60" r="4" fill="#7c4dff" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="1.4s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;6;2" dur="1.4s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="78" r="3" fill="#00ff9d" opacity="0">
    <animate attributeName="opacity" values="0;0.65;0" dur="2.1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="100" r="2.5" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;0.55;0" dur="1.7s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="100" r="2" fill="#7c4dff" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.3s" begin="2.0s" repeatCount="indefinite"/>
  </circle>
</svg>
