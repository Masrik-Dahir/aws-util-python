<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="kfs-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="50%" stop-color="#0b1525"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    <!-- Partition line colors -->
    <linearGradient id="kfs-line-p0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kfs-line-p1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cf5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c5cf5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kfs-line-p2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kfs-line-p3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kfs-line-p4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="kfs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="kfs-node-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#kfs-bg)"/>

  <!-- Left: Producer node -->
  <rect x="25" y="46" width="60" height="28" rx="5" fill="#0d2240" stroke="#00d4aa" stroke-width="1.2"/>
  <text x="55" y="64" font-family="'Segoe UI',sans-serif" font-size="9" fill="#00d4aa" text-anchor="middle" letter-spacing="1">PRODUCER</text>

  <!-- Producer pulse -->
  <circle cx="85" cy="60" r="3" fill="#00d4aa" filter="url(#kfs-glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center: Kafka broker box -->
  <rect x="170" y="30" width="70" height="60" rx="6" fill="#0e1a30" stroke="#7c5cf5" stroke-width="1.5"/>
  <text x="205" y="56" font-family="'Segoe UI',sans-serif" font-size="8" fill="#a89cf5" text-anchor="middle" letter-spacing="1">KAFKA</text>
  <!-- Partition slots inside broker -->
  <rect x="178" y="61" width="54" height="5" rx="2" fill="#00d4aa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="178" y="69" width="54" height="5" rx="2" fill="#7c5cf5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="178" y="77" width="54" height="5" rx="2" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.9s" begin="0.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Fan-out lines from broker to consumers (right side) -->
  <!-- Line to Consumer 0 (top) -->
  <line x1="240" y1="45" x2="560" y2="20" stroke="url(#kfs-line-p0)" stroke-width="1.5"/>
  <!-- Line to Consumer 1 -->
  <line x1="240" y1="52" x2="560" y2="40" stroke="url(#kfs-line-p1)" stroke-width="1.5"/>
  <!-- Line to Consumer 2 (center) -->
  <line x1="240" y1="60" x2="560" y2="60" stroke="url(#kfs-line-p2)" stroke-width="1.5"/>
  <!-- Line to Consumer 3 -->
  <line x1="240" y1="68" x2="560" y2="80" stroke="url(#kfs-line-p3)" stroke-width="1.5"/>
  <!-- Line to Consumer 4 (bottom) -->
  <line x1="240" y1="75" x2="560" y2="100" stroke="url(#kfs-line-p4)" stroke-width="1.5"/>

  <!-- Fan-in line from producer to broker -->
  <line x1="85" y1="60" x2="170" y2="60" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>

  <!-- Animated message dots on fan-out lines -->
  <!-- Partition 0 dot -->
  <circle cx="0" cy="0" r="3.5" fill="#00d4aa" filter="url(#kfs-glow)">
    <animateMotion path="M240,45 L560,20" dur="1.4s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Partition 1 dot -->
  <circle cx="0" cy="0" r="3.5" fill="#7c5cf5" filter="url(#kfs-glow)">
    <animateMotion path="M240,52 L560,40" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Partition 2 dot -->
  <circle cx="0" cy="0" r="3.5" fill="#f59e0b" filter="url(#kfs-glow)">
    <animateMotion path="M240,60 L560,60" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Partition 3 dot -->
  <circle cx="0" cy="0" r="3.5" fill="#f472b6" filter="url(#kfs-glow)">
    <animateMotion path="M240,68 L560,80" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Partition 4 dot -->
  <circle cx="0" cy="0" r="3.5" fill="#34d399" filter="url(#kfs-glow)">
    <animateMotion path="M240,75 L560,100" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Secondary dots (staggered) -->
  <circle cx="0" cy="0" r="2.5" fill="#00d4aa">
    <animateMotion path="M240,45 L560,20" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.05;0.9;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="0" r="2.5" fill="#7c5cf5">
    <animateMotion path="M240,52 L560,40" dur="1.6s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.05;0.9;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="0" r="2.5" fill="#f59e0b">
    <animateMotion path="M240,60 L560,60" dur="1.2s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.05;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Right: Consumer group nodes -->
  <!-- Consumer 0 -->
  <rect x="560" y="8" width="50" height="22" rx="4" fill="#0d2240" stroke="#00d4aa" stroke-width="1"/>
  <text x="585" y="22" font-family="'Segoe UI',sans-serif" font-size="7.5" fill="#00d4aa" text-anchor="middle">P-0</text>
  <!-- Consumer 1 -->
  <rect x="560" y="29" width="50" height="22" rx="4" fill="#0d2240" stroke="#7c5cf5" stroke-width="1"/>
  <text x="585" y="43" font-family="'Segoe UI',sans-serif" font-size="7.5" fill="#a89cf5" text-anchor="middle">P-1</text>
  <!-- Consumer 2 -->
  <rect x="560" y="49" width="50" height="22" rx="4" fill="#0d2240" stroke="#f59e0b" stroke-width="1"/>
  <text x="585" y="63" font-family="'Segoe UI',sans-serif" font-size="7.5" fill="#f59e0b" text-anchor="middle">P-2</text>
  <!-- Consumer 3 -->
  <rect x="560" y="69" width="50" height="22" rx="4" fill="#0d2240" stroke="#f472b6" stroke-width="1"/>
  <text x="585" y="83" font-family="'Segoe UI',sans-serif" font-size="7.5" fill="#f472b6" text-anchor="middle">P-3</text>
  <!-- Consumer 4 -->
  <rect x="560" y="89" width="50" height="22" rx="4" fill="#0d2240" stroke="#34d399" stroke-width="1"/>
  <text x="585" y="103" font-family="'Segoe UI',sans-serif" font-size="7.5" fill="#34d399" text-anchor="middle">P-4</text>

  <!-- Consumer activity pulses -->
  <circle cx="617" cy="19" r="3" fill="#00d4aa">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="617" cy="40" r="3" fill="#7c5cf5">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="617" cy="60" r="3" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="617" cy="80" r="3" fill="#f472b6">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="617" cy="100" r="3" fill="#34d399">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Text overlay -->
  <rect x="170" y="28" width="270" height="65" rx="8" fill="#000814" opacity="0.5"/>
  <text x="305" y="62" font-family="'Segoe UI',sans-serif" font-size="19" font-weight="700"
        fill="#e2f0ff" text-anchor="middle" letter-spacing="2">
    aws-util-python<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="305" y="81" font-family="'Segoe UI',sans-serif" font-size="11"
        fill="#7c5cf5" text-anchor="middle" letter-spacing="2">
    Multi-Service AWS Orchestration<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
