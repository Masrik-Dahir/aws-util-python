<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="awsutil-ebf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c18"/>
      <stop offset="50%" stop-color="#0c1028"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="awsutil-ebf-bus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <filter id="awsutil-ebf-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="awsutil-ebf-glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#awsutil-ebf-bg)"/>

  <!-- Left event bus backbone -->
  <rect x="40" y="50" width="150" height="4" rx="2" fill="url(#awsutil-ebf-bus)" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.7" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Left producer nodes (emit events) -->
  <circle cx="55" cy="25" r="4" fill="#ff6b6b" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.3s" fill="freeze"/>
    <animate attributeName="r" values="4;5;4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <line x1="55" y1="29" x2="65" y2="48" stroke="#ff6b6b" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="0.3s" fill="freeze"/>
  </line>
  <!-- Traveling event from producer 1 -->
  <circle r="2" fill="#ff6b6b" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="55;65" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="29;48" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="90" cy="20" r="4" fill="#ffd93d" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animate attributeName="r" values="4;5;4" dur="2.3s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <line x1="90" y1="24" x2="95" y2="48" stroke="#ffd93d" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="0.5s" fill="freeze"/>
  </line>
  <circle r="2" fill="#ffd93d" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="90;95" dur="1.8s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="24;48" dur="1.8s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="130" cy="28" r="4" fill="#6bcb77" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.7s" fill="freeze"/>
    <animate attributeName="r" values="4;5;4" dur="1.9s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <line x1="130" y1="32" x2="125" y2="48" stroke="#6bcb77" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="0.7s" fill="freeze"/>
  </line>
  <circle r="2" fill="#6bcb77" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="130;125" dur="1.6s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="32;48" dur="1.6s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Left subscriber fan-out lines -->
  <line x1="100" y1="56" x2="55" y2="90" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="0.9s" fill="freeze"/>
  </line>
  <line x1="115" y1="56" x2="95" y2="95" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1s" fill="freeze"/>
  </line>
  <line x1="135" y1="56" x2="145" y2="92" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1.1s" fill="freeze"/>
  </line>
  <line x1="155" y1="56" x2="180" y2="88" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1.2s" fill="freeze"/>
  </line>

  <!-- Left subscriber nodes -->
  <rect x="45" y="88" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.2s" fill="freeze"/>
  </rect>
  <rect x="85" y="93" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.3s" fill="freeze"/>
  </rect>
  <rect x="136" y="90" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.4s" fill="freeze"/>
  </rect>
  <rect x="171" y="86" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- Traveling fan-out messages (left) -->
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;55" dur="1.2s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;90" dur="1.2s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="115;95" dur="1.2s" begin="2.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;95" dur="1.2s" begin="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="135;145" dur="1.2s" begin="2.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;92" dur="1.2s" begin="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.9s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="155;180" dur="1.2s" begin="2.9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;88" dur="1.2s" begin="2.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Right event bus backbone -->
  <rect x="610" y="50" width="150" height="4" rx="2" fill="url(#awsutil-ebf-bus)" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.7" dur="0.8s" begin="0.2s" fill="freeze"/>
  </rect>

  <!-- Right producer nodes -->
  <circle cx="680" cy="22" r="4" fill="#c084fc" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.4s" fill="freeze"/>
    <animate attributeName="r" values="4;5;4" dur="2.1s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <line x1="680" y1="26" x2="685" y2="48" stroke="#c084fc" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="0.4s" fill="freeze"/>
  </line>
  <circle r="2" fill="#c084fc" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="680;685" dur="1.7s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="26;48" dur="1.7s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="720" cy="30" r="4" fill="#f472b6" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="0.6s" fill="freeze"/>
    <animate attributeName="r" values="4;5;4" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <line x1="720" y1="34" x2="715" y2="48" stroke="#f472b6" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" begin="0.6s" fill="freeze"/>
  </line>
  <circle r="2" fill="#f472b6" opacity="0" filter="url(#awsutil-ebf-glow-sm)">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="720;715" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="34;48" dur="2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Right subscriber fan-out lines -->
  <line x1="650" y1="56" x2="625" y2="88" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="0.9s" fill="freeze"/>
  </line>
  <line x1="680" y1="56" x2="670" y2="95" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1s" fill="freeze"/>
  </line>
  <line x1="710" y1="56" x2="720" y2="90" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1.1s" fill="freeze"/>
  </line>
  <line x1="740" y1="56" x2="755" y2="86" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.6s" begin="1.2s" fill="freeze"/>
  </line>

  <!-- Right subscriber nodes -->
  <rect x="616" y="86" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.2s" fill="freeze"/>
  </rect>
  <rect x="661" y="93" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.3s" fill="freeze"/>
  </rect>
  <rect x="711" y="88" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.4s" fill="freeze"/>
  </rect>
  <rect x="746" y="84" width="18" height="10" rx="2" fill="#1a3050" stroke="#00c8ff" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- Traveling fan-out messages (right) -->
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="650;625" dur="1.2s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;88" dur="1.2s" begin="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="680;670" dur="1.2s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;95" dur="1.2s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="710;720" dur="1.2s" begin="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;90" dur="1.2s" begin="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#00e5ff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="3.1s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="740;755" dur="1.2s" begin="3.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;86" dur="1.2s" begin="3.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Dark overlay for text readability -->
  <rect x="210" y="22" width="380" height="78" rx="10" fill="#000000" opacity="0.55"/>

  <!-- Project name -->
  <text x="400" y="55" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#e8f0ff" text-anchor="middle" letter-spacing="4" opacity="0">
    aws-util
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="400" y="80" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#66ccff" text-anchor="middle" letter-spacing="1" opacity="0">
    Production-grade AWS wrappers for every service, sync and async
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>