<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <radialGradient id="psr-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0d18"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="psr-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f2ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <filter id="psr-glow">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="psr-glow-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#psr-bg)"/>

  <!-- Distant stars -->
  <circle cx="45" cy="15" r="0.7" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="30" r="0.9" fill="#ffffff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="20" r="0.8" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="95" r="0.6" fill="#ffffff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="90" r="0.7" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="105" r="0.9" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Left pulsar — sweep arcs -->
  <circle cx="120" cy="60" r="6" fill="url(#psr-core)" filter="url(#psr-glow)">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Left sweep arcs -->
  <ellipse cx="120" cy="60" rx="20" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.7">
    <animate attributeName="rx" values="20;50;80" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="120" cy="60" rx="20" ry="12" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.5">
    <animate attributeName="rx" values="20;50;80" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="120" cy="60" rx="20" ry="12" fill="none" stroke="#bfdbfe" stroke-width="0.6" opacity="0.4">
    <animate attributeName="rx" values="20;50;80" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right pulsar -->
  <circle cx="680" cy="60" r="6" fill="url(#psr-core)" filter="url(#psr-glow)">
    <animate attributeName="r" values="6;9;6" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Right sweep arcs -->
  <ellipse cx="680" cy="60" rx="20" ry="12" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.7">
    <animate attributeName="rx" values="20;50;80" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="680" cy="60" rx="20" ry="12" fill="none" stroke="#c4b5fd" stroke-width="0.8" opacity="0.5">
    <animate attributeName="rx" values="20;50;80" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0" dur="2s" begin="1.4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="680" cy="60" rx="20" ry="12" fill="none" stroke="#ddd6fe" stroke-width="0.6" opacity="0.4">
    <animate attributeName="rx" values="20;50;80" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;30;50" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0" dur="2s" begin="1.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Jet beam from left pulsar to center -->
  <line x1="126" y1="60" x2="360" y2="60" stroke="#60a5fa" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Jet beam from right pulsar to center -->
  <line x1="674" y1="60" x2="440" y2="60" stroke="#a78bfa" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </line>

  <!-- Traveling pulse dots on left beam -->
  <circle cx="126" cy="60" r="3" fill="#93c5fd" opacity="0.9" filter="url(#psr-glow-sm)">
    <animate attributeName="cx" values="126;360;360" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="126" cy="60" r="3" fill="#93c5fd" opacity="0.9" filter="url(#psr-glow-sm)">
    <animate attributeName="cx" values="126;360;360" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling pulse dots on right beam -->
  <circle cx="674" cy="60" r="3" fill="#c4b5fd" opacity="0.9" filter="url(#psr-glow-sm)">
    <animate attributeName="cx" values="674;440;440" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="674" cy="60" r="3" fill="#c4b5fd" opacity="0.9" filter="url(#psr-glow-sm)">
    <animate attributeName="cx" values="674;440;440" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Text background -->
  <rect x="185" y="30" width="430" height="62" rx="10" fill="#000614" opacity="0.55"/>

  <!-- Project name text -->
  <text x="400" y="57" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#e0f2ff" text-anchor="middle" letter-spacing="3">
    aws-util<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="80" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#93c5fd" text-anchor="middle" letter-spacing="2">
    Python · AWS SDK Utilities · Sync &amp; Async<animate attributeName="opacity" values="0;1" begin="0.7s" dur="0.9s" fill="freeze"/>
  </text>
</svg>
