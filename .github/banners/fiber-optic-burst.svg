<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="fob-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="50%" stop-color="#080c1a"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <radialGradient id="fob-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fob-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fob-glow-soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#fob-bg)"/>

  <!-- Central burst core glow -->
  <ellipse cx="400" cy="60" rx="80" ry="40" fill="url(#fob-core)">
    <animate attributeName="rx" values="80;100;80" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Fiber strands — left burst (cyan) -->
  <g filter="url(#fob-glow)">
    <line x1="400" y1="60" x2="20" y2="10" stroke="#00d4ff" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0;0.9;0" dur="1.8s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="30" y2="40" stroke="#00aaff" stroke-width="1.4">
      <animate attributeName="stroke-opacity" values="0;1;0" dur="2.1s" begin="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="10" y2="60" stroke="#00d4ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0;0.8;0" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="25" y2="90" stroke="#40e0ff" stroke-width="1.3">
      <animate attributeName="stroke-opacity" values="0;0.9;0" dur="2.3s" begin="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="60" y2="110" stroke="#00c8ff" stroke-width="1.1">
      <animate attributeName="stroke-opacity" values="0;0.7;0" dur="1.9s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="120" y2="5" stroke="#00e0ff" stroke-width="0.9">
      <animate attributeName="stroke-opacity" values="0;0.6;0" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="100" y2="115" stroke="#20d0ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0;0.8;0" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="180" y2="8" stroke="#00b8ff" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0;0.5;0" dur="1.7s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="200" y2="115" stroke="#10d8ff" stroke-width="0.9">
      <animate attributeName="stroke-opacity" values="0;0.7;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Fiber strands — right burst (amber/violet) -->
  <g filter="url(#fob-glow)">
    <line x1="400" y1="60" x2="780" y2="10" stroke="#ff8c00" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0;0.9;0" dur="2s" begin="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="770" y2="40" stroke="#ff6a00" stroke-width="1.4">
      <animate attributeName="stroke-opacity" values="0;1;0" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="790" y2="60" stroke="#ffaa00" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0;0.8;0" dur="2.3s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="775" y2="90" stroke="#ff7800" stroke-width="1.3">
      <animate attributeName="stroke-opacity" values="0;0.9;0" dur="1.9s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="740" y2="112" stroke="#ff5500" stroke-width="1.1">
      <animate attributeName="stroke-opacity" values="0;0.7;0" dur="2.1s" begin="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="680" y2="5" stroke="#c060ff" stroke-width="0.9">
      <animate attributeName="stroke-opacity" values="0;0.6;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="700" y2="115" stroke="#9040ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0;0.8;0" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="620" y2="8" stroke="#a050ff" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0;0.5;0" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="60" x2="600" y2="115" stroke="#b060ee" stroke-width="0.9">
      <animate attributeName="stroke-opacity" values="0;0.7;0" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Traveling photon dots — left fibers -->
  <circle r="2.5" fill="#00d4ff" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L20,10" dur="1.8s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="1.8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#40e0ff" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L25,90" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.2" fill="#00aaff" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L10,60" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling photon dots — right fibers -->
  <circle r="2.5" fill="#ff8c00" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L780,10" dur="2s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="2s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#c060ff" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L700,115" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.2" fill="#ff6a00" filter="url(#fob-glow)">
    <animateMotion path="M400,60 L790,60" dur="1.9s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2" dur="1.9s" begin="0s" repeatCount="indefinite"/>
  </circle>

  <!-- Core pulse ring -->
  <circle cx="400" cy="60" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#fob-glow)">
    <animate attributeName="r" values="6;18;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="60" r="5" fill="#00d4ff" opacity="0.9" filter="url(#fob-glow)">
    <animate attributeName="r" values="4;6;4" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Text overlay background -->
  <rect x="200" y="32" width="400" height="58" rx="6" fill="#000000" opacity="0.55"/>

  <!-- Author name -->
  <text x="400" y="57" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="700"
        fill="#e8f4ff" text-anchor="middle" letter-spacing="3">
    Masrik Dahir
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <!-- Website -->
  <text x="400" y="79" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#00d4ff" text-anchor="middle" letter-spacing="2">
    ✦ masrikdahir.com ✦
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>
