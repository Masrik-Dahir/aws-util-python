<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="awsutil-liss-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1025"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="awsutil-liss-g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#aa66ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="awsutil-liss-g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="awsutil-liss-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="awsutil-liss-glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#awsutil-liss-bg)"/>

  <!-- Left Lissajous figure (3:2 ratio) -->
  <g transform="translate(140,60)" filter="url(#awsutil-liss-glow)">
    <!-- Lissajous path approximation (3:2 frequency ratio) -->
    <path d="M0,-40 C18,-40 30,-20 40,0 C50,20 45,40 30,40 C15,40 5,20 -5,0 C-15,-20 -20,-40 -10,-40 C0,-40 15,-20 25,0 C35,20 40,40 25,40 C10,40 -5,20 -15,0 C-25,-20 -30,-40 -20,-40 C-10,-40 0,-20 10,0 C20,20 30,40 15,40 C0,40 -15,20 -25,0 C-35,-20 -40,-40 -30,-40 C-20,-40 -10,-20 0,0"
          fill="none" stroke="url(#awsutil-liss-g1)" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0.8" dur="2s" fill="freeze"/>
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="3s" fill="freeze"/>
      <set attributeName="stroke-dasharray" to="600"/>
    </path>
    <!-- Traveling dot on Lissajous -->
    <circle r="3" fill="#00e5ff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
      <animate attributeName="cx" values="0;40;30;-5;-10;25;-15;-20;10;15;-25;-30;0" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-40;0;40;0;-40;0;40;0;-40;40;0;-40;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right Lissajous figure (mirrored, different phase) -->
  <g transform="translate(660,60)" filter="url(#awsutil-liss-glow)">
    <path d="M0,40 C-18,40 -30,20 -40,0 C-50,-20 -45,-40 -30,-40 C-15,-40 -5,-20 5,0 C15,20 20,40 10,40 C0,40 -15,20 -25,0 C-35,-20 -40,-40 -25,-40 C-10,-40 5,-20 15,0 C25,20 30,40 20,40 C10,40 -5,20 -15,0 C-25,-20 -30,-40 -15,-40 C0,-40 15,-20 25,0 C35,20 40,40 30,40"
          fill="none" stroke="url(#awsutil-liss-g2)" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0.7" dur="2s" begin="0.5s" fill="freeze"/>
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="3s" begin="0.5s" fill="freeze"/>
      <set attributeName="stroke-dasharray" to="600"/>
    </path>
    <circle r="3" fill="#ff6ec7" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
      <animate attributeName="cx" values="0;-40;-30;5;10;-25;15;20;-10;-15;25;30;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;0;-40;0;40;0;-40;0;40;-40;0;40;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connecting sine wave between left and right -->
  <path d="M200,60 C250,30 300,90 350,60 C400,30 450,90 500,60 C550,30 600,90 600,60"
        fill="none" stroke="#aa66ff" stroke-width="0.8" opacity="0" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.3;0.3" dur="1.5s" begin="0.8s" fill="freeze"/>
    <animate attributeName="d"
             values="M200,60 C250,30 300,90 350,60 C400,30 450,90 500,60 C550,30 600,90 600,60;
                     M200,60 C250,90 300,30 350,60 C400,90 450,30 500,60 C550,90 600,30 600,60;
                     M200,60 C250,30 300,90 350,60 C400,30 450,90 500,60 C550,30 600,90 600,60"
             dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- Phase indicator dots along top -->
  <circle cx="250" cy="15" r="2" fill="#00e5ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="15" r="2" fill="#aa66ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="15" r="2" fill="#ff6ec7" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="15" r="2" fill="#ffd700" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase indicator dots along bottom -->
  <circle cx="300" cy="108" r="1.5" fill="#00e5ff" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="108" r="1.5" fill="#aa66ff" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="108" r="1.5" fill="#ff6ec7" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Dark overlay for text readability -->
  <rect x="180" y="28" width="440" height="68" rx="10" fill="#000000" opacity="0.5"/>

  <!-- Author name -->
  <text x="400" y="55" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#e8e8ff" text-anchor="middle" letter-spacing="3" opacity="0">
    Masrik Dahir
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Website -->
  <text x="400" y="80" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#aa88ff" text-anchor="middle" letter-spacing="2" opacity="0">
    &#x2726; masrikdahir.com &#x2726;
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>