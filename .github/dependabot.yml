version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      aws:
        patterns:
          - "boto3*"
          - "botocore*"
          - "moto*"
      testing:
        patterns:
          - "pytest*"
          - "coverage*"
          - "coverlet*"
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "black"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
